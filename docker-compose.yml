version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: edu
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/edu.sql:/docker-entrypoint-initdb.d/edu.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/13629102205ddd
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "13629102205ddd", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      MYSQL_HOST: mysql
      NEO4J_URI: neo4j://neo4j:7687
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./finetuned:/app/finetuned

volumes:
  mysql_data:
  neo4j_data:
